name: leo-claude
description: Declarative workflow engine for CLI-only GitHub issue lifecycle.

# ---------------------------------------------------------------------------
# Inputs — provided by the user at invocation time
# ---------------------------------------------------------------------------
inputs:
  issue:
    description: GitHub issue number or full URL
    required: true
  target_branch:
    description: >
      Override the default target branch via a named input
      (`target_branch=<branch>`).
    required: false
  review_limits:
    description: >
      Comma-separated max review iterations for development, translation,
      and documentation stages via a named input
      (`review_limits=6,3,2`). Overrides defaults from the review_limits
      section below.
    required: false

# ---------------------------------------------------------------------------
# Review iteration limits — max review→implement loops before halting
# Override at invocation via review_limits input (e.g. "6,3,2").
# ---------------------------------------------------------------------------
review_limits:
  development: 5
  translation: 3
  documentation: 3

# ---------------------------------------------------------------------------
# Branch and merge settings
# ---------------------------------------------------------------------------
branches:
  target_base: develop
  merge_method: squash          # merge | squash | rebase
  prefixes:
    issue: issue
    translation: issue-i18n
    documentation: issue-docs
  pattern: "{prefix}/{issue-number}-{short-slug}"

# ---------------------------------------------------------------------------
# GitHub account hints (optional)
# Set these to your own GitHub usernames before running the workflow.
# If left empty, the workflow will prompt you to provide them.
# ---------------------------------------------------------------------------
github:
  dev_user: ""
  review_user: ""

# ---------------------------------------------------------------------------
# Role definitions — each role maps to a CLI binary
# Every stage must declare exactly one role; no stage may be role-less.
# ---------------------------------------------------------------------------
roles:
  orchestrator:
    bin: claude          # the invoking Claude Code session
    prompt: ""           # no prompt file — orchestrator interprets workflow.yml directly
    args: ""
    note: >
      Owns preflight, context, branch, and merge stages.
      It is always the same agent that launched the workflow; it never
      switches identity between stages.
  implementer:
    bin: claude
    prompt: prompts/implementer.md
    args: ""
  reviewer:
    bin: codex
    prompt: prompts/reviewer.md
    args: ""
  translator:
    bin: scripts/vibe-wrapper.sh
    prompt: prompts/translator.md
    args: "--output text"
    stdin: /dev/null           # vibe hangs if stdin is open; close it
  documentor:
    bin: scripts/vibe-wrapper.sh
    prompt: prompts/documentor.md
    args: "--output text"
    stdin: /dev/null           # vibe hangs if stdin is open; close it

# ---------------------------------------------------------------------------
# CLI dependencies required before the workflow can run
# ---------------------------------------------------------------------------
preflight:
  required_tools:
    - bash
    - git
    - gh
    - rg
  checks:
    - scripts/preflight.sh

# ---------------------------------------------------------------------------
# Handoff contract — context passed to every role at each stage
# ---------------------------------------------------------------------------
handoff:
  - repo_path
  - issue_number
  - issue_url
  - parent_issue_summary
  - sub_issue_list
  - target_branch
  - working_branch
  - acceptance_criteria
  - changed_files
  - check_outcomes
  - next_action
  - reviewer_mode        # "comments" | "change_request" — set once in context, never recomputed
  - review_limits        # {development, translation, documentation} — max iterations per loop

# ---------------------------------------------------------------------------
# Stages — executed in order; each stage can be conditional or skipped
# ---------------------------------------------------------------------------
stages:

  - id: preflight
    name: Preflight gate
    role: orchestrator
    description: Validate tools, auth, config, and role binaries.
    on_failure: halt
    steps:
      - run: scripts/preflight.sh
      - verify: roles
        message: >
          Stop and report exactly which role is blocked and what
          needs remediation.
      - verify: github.dev_user is a non-empty string
        message: >
          github.dev_user must be set in workflow.yml before running.
          Halt and ask the user to configure it.
      - verify: github.review_user is a non-empty string
        message: >
          github.review_user must be set in workflow.yml before running.
          Halt and ask the user to configure it.

  - id: context
    name: Prepare issue context
    role: orchestrator
    description: Resolve the issue, sub-issues, and build an execution plan.
    commands:
      - gh issue view {issue}
      - gh issue list
      - gh api graphql
      - git fetch
    steps:
      - resolve: issue_number from input
      - read: parent issue via gh issue view
      - resolve: >
          sub-issues by running scripts/resolve-sub-issues.py {issue}.
          The script checks two sources in priority order:
            1. GitHub native sub-issues (GraphQL subIssues field)
            2. Task-list body references (lines matching `- [ ] #N`)
          Output is NDJSON; each line has number, title, state, source, url.
          Collect all results into sub_issue_list.
      - build: execution plan covering parent + in-scope sub-issues
      - set: review_limits
        rule: >
          Start with the defaults from the top-level review_limits section.
          If the review_limits input is provided, parse it as exactly three
          comma-separated integers in development, translation, documentation
          order. Store the effective
          {development, translation, documentation} object in handoff for all
          later stages. If parsing fails, halt and report the expected format
          (`review_limits=6,3,2`).
      - set: reviewer_mode
        rule: >
          Compare github.dev_user and github.review_user (both already
          validated as non-empty by preflight).
          If they are equal → reviewer_mode = "comments".
          If they differ  → reviewer_mode = "change_request".
          Store the result in handoff. Do not recompute it in later stages.
      - switch: >
          GitHub account to github.dev_user.
          This value is already validated non-empty; do not prompt the user.

  - id: branch
    name: Create issue branch
    role: orchestrator
    description: Create a working branch from the target base.
    steps:
      - checkout: "{branches.target_base}"
      - pull: update local branch
      - create: "{branches.prefixes.issue}/{issue-number}-{short-slug}"

  - id: implement
    name: Implement
    role: implementer
    description: >
      Complete the parent issue and every sub-issue in sub_issue_list on the
      working branch. Sub-issues come from GitHub native child issues or
      task-list body references (resolved in the context stage).
    rules:
      - Implement the parent issue first, then each sub-issue in sub_issue_list in order.
      - Treat every OPEN sub-issue in sub_issue_list as in-scope unless it is explicitly deferred.
      - Respect repository guidance files before editing.
      - Run tests and type checks before handing off.
      - Commit logically grouped changes; reference each issue number in the commit message.
      - If a sub-issue is blocked or out of scope, pause and surface it — do not silently skip.

  - id: review
    name: Review
    role: reviewer
    description: Review the diff for regressions, correctness, and branch hygiene.
    max_iterations: "{review_limits.development}"
    rules:
      - Review diff against the target branch.
      - Focus on regressions, correctness, missing tests, migration risk, branch hygiene.
      - Look into touched files or related code if the diff alone is insufficient.
      - Read reviewer_mode from handoff — it is already set and must not be recomputed.
      - If reviewer_mode == "comments"       → post feedback as inline and general PR comments only; do not submit a change request.
      - If reviewer_mode == "change_request" → submit a formal change request when issues are found.
      - If issues found, return to implementer, then re-review after fixes.
      - Only continue once review is explicitly clean.
      - Track the current iteration count. If the review→implement loop reaches max_iterations without a clean review, halt the workflow and report to the user.
    on_failure: goto implement

  - id: merge
    name: Merge and clean up
    role: orchestrator
    description: Merge, close all implemented issues, delete the issue branch.
    steps:
      - action: merge
        source: "{working_branch}"
        target: "{branches.target_base}"
        method: "{branches.merge_method}"
      - action: resolve_linked
        description: >
          Collect every issue that must be closed. Three sources must all be
          checked and their results deduplicated:
            1. Sub-issues — run scripts/resolve-sub-issues.py {issue_number}
               (GitHub native sub-issues + task-list body references).
            2. PR-body keywords — run `gh pr view --json body` on the merged PR
               and extract every issue number referenced by a closing keyword
               (Closes, Fixes, Resolves, close, fix, resolve — case-insensitive,
               followed by #N or a full GitHub issue URL).
            3. Commit-message keywords — run `gh pr view --json commits` on
               the merged PR and apply the same closing-keyword extraction to
               every commit message title and body.
          Combine all three sets into a single deduplicated list.
          Exclude issues whose state is already CLOSED.
          Exclude the parent issue number (it is always closed separately).
        output: linked_issue_list   # list of issue numbers to close alongside parent
      - action: close
        command: >
          scripts/resolve-sub-issues.py {issue_number} |
          scripts/close-issues.py {issue_number}
        scope: >
          Parent issue, every OPEN sub-issue that was implemented, AND every
          issue collected in linked_issue_list.
          Pass linked_issue_list numbers to close-issues.py as additional
          arguments or by prepending synthetic NDJSON lines so the script
          closes them.
          Sub-issues deferred or left out of scope must NOT be closed.
          Issues already CLOSED must NOT be re-closed.
      - action: delete
        branch: "{working_branch}"
        where: local and remote
    rules:
      - Always resolve linked_issue_list before running the close command — never skip this step even if sub_issue_list is empty.
      - Close every issue in linked_issue_list that is OPEN, regardless of whether it appears in sub_issue_list.
      - Do not close sub-issues that were explicitly deferred or skipped.
      - If gh commands fail to fetch PR body or commits, report the error and ask the user whether to proceed or abort — do not silently skip linked issue closure.
      - After closing, verify each targeted issue is now CLOSED via `gh issue view`; if any remain open, retry once then report to the user.

  - id: translate
    name: Translation follow-up
    role: translator
    condition: new or changed user-facing strings exist
    description: Update locale targets on a follow-up branch after the feature merge.
    max_iterations: "{review_limits.translation}"
    branch: "{branches.prefixes.translation}/{issue-number}-{short-slug}"
    steps:
      - action: inspect
        scope: merged work for new or changed user-facing strings
      - action: skip_if
        condition: no translation work needed
      - action: update
        scope: every required locale target
      - action: check
        scope: translation-bearing files
      - action: merge
        target: "{branches.target_base}"
      - action: close
        scope: translation-specific issue if one exists
      - action: delete
        branch: follow-up branch

  - id: document
    name: Documentation follow-up
    role: documentor
    condition: change affects user flows, setup, architecture, ops, or notable behavior
    description: Update docs on a follow-up branch after the feature merge.
    max_iterations: "{review_limits.documentation}"
    branch: "{branches.prefixes.documentation}/{issue-number}-{short-slug}"
    steps:
      - action: inspect
        scope: shipped functionality, not the original issue text
      - action: skip_if
        condition: no documentation update needed
      - action: update
        scope: relevant docs aligned with actual merged implementation
      - action: merge
        target: "{branches.target_base}"
      - action: delete
        branch: follow-up branch

# ---------------------------------------------------------------------------
# Completion — all conditions that must be true for the workflow to be done
# ---------------------------------------------------------------------------
completion:
  - parent issue implemented
  - in-scope sub-issues implemented
  - reviewer sign-off obtained
  - code merged into target branch
  - completed issues closed
  - issue branches deleted
  - translation checked and merged if needed
  - documentation checked and merged if needed

# ---------------------------------------------------------------------------
# Failure rules — global error handling
# ---------------------------------------------------------------------------
failure:
  preflight_fail: >
    Stop before changing code. Explain the exact problem. Ask the user to
    remediate. Do not continue until confirmed.
  review_fail: >
    Do not merge. Return to implementer.
  followup_conflict: >
    Translation or documentation changes go on follow-up branches, never
    the already-deleted issue branch.
  auth_fail: >
    If GitHub auth or permissions block issue closure, merge if the code
    workflow is otherwise complete, then tell the user exactly what remains
    manual.
  review_limit_exceeded: >
    The review→implement loop has reached max_iterations without a clean
    review. Halt the workflow, summarize unresolved issues, and ask the
    user how to proceed (override the limit, force-merge, or abandon).
  unknown: >
    Pause, summarize the failure clearly, and ask the user how to proceed.
